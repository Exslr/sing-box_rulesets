name: Manual Specific File Convert (JSON to SRS)

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: '输入要转换的 JSON 文件名 (例如: my_rules.json)，或者输入 "all" 转换全部'
        required: true
        default: 'all'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d ":" -f2 | sed 's/\"//g;s/,//g;s/ //g;s/v//')
          wget https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xvf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/

      - name: Convert Logic
        run: |
          TARGET="${{ github.event.inputs.file_name }}"
          
          # 定义搜索和转换函数
          do_compile() {
            local src=$1
            # 保持目录结构输出到 srs 文件夹
            local out="srs/${src%.json}.srs"
            mkdir -p "$(dirname "$out")"
            echo "Converting $src to $out"
            sing-box rule-set compile "$src" -o "$out"
          }

          if [ "$TARGET" = "all" ]; then
            echo "Mode: Convert all JSON files in dns/ and rules/"
            # 查找并转换所有相关的 JSON
            find dns rules -name "*.json" | while read -r file; do
              do_compile "$file"
            done
          else
            echo "Mode: Searching for specific file: $TARGET"
            # 在指定目录下查找该文件
            found_files=$(find dns rules -name "$TARGET")
            
            if [ -z "$found_files" ]; then
              echo "Error: Could not find $TARGET in dns/ or rules/ folders."
              exit 1
            fi

            for file in $found_files; do
              do_compile "$file"
            done
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add srs/**/*.srs
          if ! git diff --cached --quiet; then
            git commit -m "chore: manual compile ${{ github.event.inputs.file_name }}"
            git push
          else
            echo "No changes detected."
          fi

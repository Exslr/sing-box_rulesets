name: Manual Convert Rules (JSON to SRS)

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: '请选择要转换的文件 (例如: example.json)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - dns/always_realip.json
          - route/always_direct.json
          - route/skip_proxy.json
          - route/through_proxy.json
          - route/direct_process.json
          # 在此处手动添加你 rules 文件夹下具体的文件路径
push:
    branches:
      - main
    paths:
      - 'rules/dns/always_realip.json'
      - 'rules/route/always_direct.json'
      - 'rules/route/skip_proxy.json'
      - 'rules/route/through_proxy.json'
      - 'route/direct_process.json'
      
jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设置为 0，否则无法对比历史记录找到变更文件

      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d ":" -f2 | sed 's/\"//g;s/,//g;s/ //g;s/v//')
          wget https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xvf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/
          
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: rules/**/*.json
          
      - name: Convert Rules
        run: |
          do_compile() {
            local rel_path=$1
            local src="rules/$rel_path"
            local dest="srs/${rel_path%.json}.srs"
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$dest")"
              echo "🚀 Compiling: $src -> $dest"
              sing-box rule-set compile "$src" -o "$dest"
            fi
          }

          # 情况 1: 手动触发且不是 ALL
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.target_file }}" != "ALL" ]; then
            echo "Trigger: Manual single file"
            do_compile "${{ github.event.inputs.target_file }}"

          # 情况 2: 手动触发 ALL
          elif [ "${{ github.event.inputs.target_file }}" = "ALL" ]; then
            echo "Trigger: Manual ALL files"
            find rules -name "*.json" | while read -r full_path; do
              do_compile "${ full_path#rules/ }"
            done

          # 情况 3: Push 自动触发，仅处理变更文件
          else
            echo "Trigger: Push (Auto detect changes)"
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              # 去掉开头的 rules/ 前缀传给函数
              do_compile "${file#rules/}"
            done
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add srs/**/*.srs
          if ! git diff --cached --quiet; then
            git commit -m "chore: manual compile rules/${{ github.event.inputs.target_file }}"
            git push
          else
            echo "No changes to commit."
          fi

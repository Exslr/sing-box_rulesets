name: Manual Convert Rules (JSON to SRS)

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: '请选择要转换的文件 (例如: example.json)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - dns/always_realip.json
          - route/always_direct.json
          - route/skip_proxy.json
          - route/through_proxy.json
          # 在此处手动添加你 rules 文件夹下具体的文件路径

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d ":" -f2 | sed 's/\"//g;s/,//g;s/ //g;s/v//')
          wget https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xvf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/

      - name: Convert Rules
        run: |
          SELECTED="${{ github.event.inputs.target_file }}"
          
          # 定义转换逻辑
          # $1 是相对于 rules 文件夹的路径，如 "dns/test.json"
          do_compile() {
            local rel_path=$1
            local src="rules/$rel_path"
            local dest="srs/${rel_path%.json}.srs"
            
            mkdir -p "$(dirname "$dest")"
            echo "Converting: $src -> $dest"
            sing-box rule-set compile "$src" -o "$dest"
          }

          if [ "$SELECTED" = "ALL" ]; then
            echo "Mode: Converting ALL files in rules/dns and rules/route"
            # 遍历 rules 目录下所有的 json
            find rules -name "*.json" | while read -r full_path; do
              # 提取相对于 rules/ 的路径
              rel_path=${full_path#rules/}
              do_compile "$rel_path"
            done
          else
            echo "Mode: Converting single file: $SELECTED"
            do_compile "$SELECTED"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add srs/**/*.srs
          if ! git diff --cached --quiet; then
            git commit -m "chore: manual compile rules/${{ github.event.inputs.target_file }}"
            git push
          else
            echo "No changes to commit."
          fi

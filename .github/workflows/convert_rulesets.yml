name: Convert Rules from singbox to surge and mihomo

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: '请选择要转换的文件 (例如: example.json)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - custom/always_realip.json
          - custom/always_direct.json
          - custom/skip_proxy.json
          - custom/through_proxy.json
          - custom/direct_process.json
          # 在此处手动添加你 rules 文件夹下具体的文件路径
  push:
    branches:
      - main
    paths:
      - 'singbox/source/custom/always_realip.json'
      - 'singbox/source/custom/always_direct.json'
      - 'singbox/source/custom/skip_proxy.json'
      - 'singbox/source/custom/through_proxy.json'
      - 'singbox/source/custom/direct_process.json'
      
jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为 2，否则 git diff 找不到上一个版本
          
      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d ":" -f2 | sed 's/\"//g;s/,//g;s/ //g;s/v//')
          wget https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xvf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/

      - name: Convert JSON to SRS
        run: |
          SELECTED="${{ github.event.inputs.target_file }}"

          # --- 如果是自动触发（即 SELECTED 为空），则给 SELECTED 赋值为修改的文件 ---
          if [ -z "$SELECTED" ]; then
            SELECTED=$(git diff --name-only HEAD^ HEAD | grep '^singbox/source/' | head -n 1 | sed 's|^singbox/source/||')
          fi
          
          # 定义转换逻辑
          # $1 是相对于 source 文件夹的路径，如 "dns/test.json"
          do_compile() {
            local rel_path=$1
            local src="singbox/source/$rel_path"
            local dest="singbox/binary/${rel_path%.json}.srs"
            
            mkdir -p "$(dirname "$dest")"
            echo "Converting: $src -> $dest"
            sing-box rule-set compile "$src" -o "$dest"
          }

          if [ "$SELECTED" = "ALL" ]; then
            echo "Mode: Converting ALL files in singbox/source/dns and singbox/source/route"
            # 遍历 singbox/source/custom 目录下所有的 json
            find singbox/source/custom -name "*.json" | while read -r full_path; do
              # 提取相对于 rules/ 的路径
              rel_path=${full_path#singbox/source/}
              do_compile "$rel_path"
            done
          else
            echo "Mode: Converting single file: $SELECTED"
            do_compile "$SELECTED"
          fi
      
      - name: Convert JSON to CONF
        run: |
          SELECTED="${{ github.event.inputs.target_file }}"
          SELECTED=$(basename "$SELECTED")

          # --- 如果是自动触发（即 SELECTED 为空），则给 SELECTED 赋值为修改的文件 ---
          if [ -z "$SELECTED" ]; then
            SELECTED=$(git diff --name-only HEAD^ HEAD | grep '^singbox/source/custom/' | head -n 1 | sed 's|^singbox/source/custom/||')
          fi
          
          # 定义转换逻辑
          # $1 是相对于 custom 文件夹的路径，如 "alway_direct.json"
          do_compile() {
            local rel_path=$1
            local src="singbox/source/custom/$rel_path"
            local dest_surge="surge/custom/${rel_path%.json}.conf"
            
            # 转换为 Surge CONF
            mkdir -p "$(dirname "$dest_surge")"
            python3 scripts/convert_json_to_conf.py "$src" "$dest_surge"
           }

          if [ "$SELECTED" = "ALL" ]; then
            echo "Mode: Converting ALL files in singbox/source/custom"
            # 遍历 rules 目录下所有的 json
            find singbox/source/custom -name "*.json" | while read -r full_path; do
              # 提取相对于 custom/ 的路径
              rel_path=${full_path#singbox/source/custom/}
              do_compile "$rel_path"
            done
          elif [ -n "$SELECTED" ]; then
            echo "Mode: Single File ($SELECTED)"
            do_compile "$SELECTED"
          else
            echo "No changes detected or file selected."
          fi
      
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add singbox/binary/**/*.srs
          git add surge/custom/*.conf
          if ! git diff --cached --quiet; then
            git commit -m "chore: manual compile rules/${{ github.event.inputs.target_file }}"
            git push
          else
            echo "No changes to commit."
          fi

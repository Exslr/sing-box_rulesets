name: Manual Convert Rules (JSON to SRS)

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: '请选择要转换的文件 (例如: example.json)'
        required: true
        default: 'ALL'
        type: choice
        options:
          - ALL
          - dns/always_realip.json
          - route/always_direct.json
          - route/skip_proxy.json
          - route/through_proxy.json
          - route/direct_process.json
          # 在此处手动添加你 rules 文件夹下具体的文件路径
  push:
    branches:
      - main
    paths:
      - 'rules/dns/always_realip.json'
      - 'rules/route/always_direct.json'
      - 'rules/route/skip_proxy.json'
      - 'rules/route/through_proxy.json'
      - 'rules/route/direct_process.json'
      
jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设为 2，否则 git diff 找不到上一个版本
          
      - name: Install sing-box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d ":" -f2 | sed 's/\"//g;s/,//g;s/ //g;s/v//')
          wget https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xvf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/

      - name: Convert Rules
        run: |
          SELECTED="${{ github.event.inputs.target_file }}"

          # --- 如果是自动触发（即 SELECTED 为空），则给 SELECTED 赋值为修改的文件 ---
          if [ -z "$SELECTED" ]; then
            SELECTED=$(git diff --name-only HEAD^ HEAD | grep '^rules/' | head -n 1 | sed 's|^rules/||')
          fi
          
          # 定义转换逻辑
          # $1 是相对于 rules 文件夹的路径，如 "dns/test.json"
          do_compile() {
            local rel_path=$1
            local src="rules/$rel_path"
            local dest="srs/${rel_path%.json}.srs"
            
            mkdir -p "$(dirname "$dest")"
            echo "Converting: $src -> $dest"
            sing-box rule-set compile "$src" -o "$dest"
          }

          if [ "$SELECTED" = "ALL" ]; then
            echo "Mode: Converting ALL files in rules/dns and rules/route"
            # 遍历 rules 目录下所有的 json
            find rules -name "*.json" | while read -r full_path; do
              # 提取相对于 rules/ 的路径
              rel_path=${full_path#rules/}
              do_compile "$rel_path"
            done
          else
            echo "Mode: Converting single file: $SELECTED"
            do_compile "$SELECTED"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add srs/**/*.srs
          if ! git diff --cached --quiet; then
            git commit -m "chore: manual compile rules/${{ github.event.inputs.target_file }}"
            git push
          else
            echo "No changes to commit."
          fi
          
      # 转换json to conf
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main_files
          fetch-depth: 0

      - name: Checkout surge
        uses: actions/checkout@v4
        with:
          ref: surge
          path: surge_files

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          path: main_files
          files: |
            rules/route/*.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 运行转换
      - name: Run Converter
        run: |
          # 如果是手动触发 (workflow_dispatch)，则不传参数，触发全量转换
          # 如果是 push 触发，则传入变动文件列表
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python main_files/scripts/convert_json_to_conf.py
          else
            python main_files/scripts/convert_json_to_conf.py ${{ steps.changed-files.outputs.all_changed_files }}
          fi

      - name: Commit and Push to Surge
        working-directory: ./surge_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add custom/*.conf
          
          if git diff --staged --quiet; then
            echo "没有发现任何规则变化，跳过推送。"
          else
            git commit -m "Sync rules (Trigger: ${{ github.event_name }})"
            git push origin surge
          fi

name: Sync JSON to Surge Branch

on:
  push:
    branches:
      - main
    paths:
      - 'rules/route/skip_proxy.json'
      - 'rules/route/always_direct.json'
      - 'rules/route/through_proxy.json'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  selective-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 检出 main 分支
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main_files
          fetch-depth: 2 # 获取最近两次提交以对比差异

      # 2. 检出 surge 分支
      - name: Checkout surge
        uses: actions/checkout@v4
        with:
          ref: surge
          path: surge_files

      # 精准获取变动的文件列表
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          path: main_files
          files: |
            rules/route/*.json
            
      # 3. 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 只把变动的文件名单传给脚本
      - name: Run Converter
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python main_files/scripts/convert_json_to_conf.py ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Commit and Push to Surge
        if: steps.changed-files.outputs.any_changed == 'true'
        working-directory: ./surge_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add custom/*.conf
          
          # 只有暂存区有变化才执行提交
          if git diff --staged --quiet; then
            echo "No changes in rules."
          else
            git commit -m "Update rules: ${{ steps.changed-files.outputs.all_changed_files }}"
            git push origin surge
          fi

name: Sync JSON to Surge Branch

on:
  push:
    branches:
      - main
    paths:
      - 'rules/route/skip_proxy.json'
      - 'rules/route/always_direct.json'
      - 'rules/route/through_proxy.json'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  selective-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 检出 main 分支
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main_files
          fetch-depth: 2 # 获取最近两次提交以对比差异

      # 2. 检出 surge 分支
      - name: Checkout surge
        uses: actions/checkout@v4
        with:
          ref: surge
          path: surge_files

      # 3. 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. 识别变动并运行转换
      - name: Run Selective Converter
        id: converter
        run: |
          cd main_files
          # 获取本次提交中变动的文件名
          CHANGED=$(git diff --name-only HEAD^ HEAD | tr '\n' ' ')
          echo "Detected changes in: $CHANGED"
          cd ..
          # 运行脚本并传入变动列表
          python main_files/scripts/convert_json_to_conf.py "$CHANGED"

      # 5. 提交变动到 surge 分支
      - name: Commit and Push
        working-directory: ./surge_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 仅添加 custom 文件夹下的所有 conf 文件
          git add custom/*.conf
          
          # 检查暂存区是否有实际变动
          if git diff --staged --quiet; then
            echo "No actual changes in rules, skipping push."
          else
            git commit -m "Automated Sync: Update rules based on main branch changes"
            git push origin surge
          fi

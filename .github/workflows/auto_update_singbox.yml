name: Ruleset Auto Update - singbox

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Task (Download & Convert)
        run: python scripts/convert_singbox.py

      - name: Set up Sing-Box
        run: |
          VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/v//')
          wget -q https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box-${VERSION}-linux-amd64.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/

      - name: Compile to SRS
        run: |
          # 编译 DNS 分类
          if [ -d "singbox/source/dns" ]; then
            mkdir -p singbox/binary/dns
            for file in singbox/source/dns/*.json; do
              filename=$(basename "$file" .json)
              sing-box rule-set compile "$file" --output "singbox/binary/dns/${filename}.srs"
            done
          fi
          # 编译 Route 分类
          if [ -d "singbox/source/route" ]; then
            mkdir -p singbox/binary/route
            for file in singbox/source/route/*.json; do
              filename=$(basename "$file" .json)
              sing-box rule-set compile "$file" --output "singbox/binary/route/${filename}.srs"
            done
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add singbox/source/ singbox/binary/
          if git diff --cached --quiet; then
            echo "No changes to commit (nothing added to stash)."
          else
            echo "Changes detected, committing..."
            git commit -m "Auto Update Rules $(date +'%Y-%m-%d')"
            git push
          fi
